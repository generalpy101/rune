name: CI

# Validate every pull request (and pushes to main) before merge:
#   1. type-check + build the React/TypeScript front-end
#   2. compile the Rust/Tauri back-end on macOS, Linux and Windows
# Formatting & clippy run as non-blocking advisories so existing style
# nits don't gate a PR.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Front-end (type-check & build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build front-end
        run: npm run build

  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Tauri embeds the bundled front-end (frontendDist: ../dist),
      # so the UI must be built before the Rust crate compiles.
      - name: Build front-end
        run: npm run build

      - name: Check formatting (advisory)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Build
        run: cargo build --manifest-path src-tauri/Cargo.toml --release
